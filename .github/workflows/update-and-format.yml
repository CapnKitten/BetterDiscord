name: Update and Format

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [update_class]

permissions:
  contents: write

jobs:
  update-and-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: Update all classes
        id: update-all
        uses: flowerey/class-update@main
        with:
          folder: "."
          ext: css

      - name: Run Biome
        id: biome
        run: biome ci

      - name: Generate Run Summary
        if: always()
        run: |
          STATUS=$(git status --porcelain)
          echo "## Workflow Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "Date: $(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -n "$STATUS" ]; then
            echo "### Modified Files" >> $GITHUB_STEP_SUMMARY
            echo "The following changes were detected and formatted:" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            echo "$STATUS" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "Status: No changes detected. Repository is up to date." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "chore: update classes and format with biome"
            git push origin HEAD:master --force-with-lease
          else
            echo "No changes to commit"
          fi
